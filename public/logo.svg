<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60" fill="none">
  <!-- Icon: Geometric R with upward ramp motion -->
  <g>
    <!-- Base ramp shape -->
    <path d="M8 44 L8 16 L22 16 C30 16 35 20 35 27 C35 32 32 36 27 37.5 L36 44 L28 44 L20 38 L16 38 L16 44 Z" fill="#0A2540"/>
    <!-- Ramp accent line (cyan) suggesting upward motion -->
    <path d="M16 16 L16 33 L24 33 C27.5 33 29 31 29 27 C29 23 27.5 21 24 21 L16 21" fill="none" stroke="#0A2540" stroke-width="0"/>
    <rect x="16" y="21" width="8" height="12" rx="4" fill="#0A2540"/>
    <!-- Upward ramp accent -->
    <path d="M38 44 L50 16" stroke="#00C9A7" stroke-width="3" stroke-linecap="round"/>
    <path d="M38 44 L50 44" stroke="#00C9A7" stroke-width="3" stroke-linecap="round"/>
    <path d="M50 16 L50 44" stroke="#00C9A7" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 3"/>
  </g>

  <!-- Wordmark: Rampit -->
  <text
    x="62"
    y="38"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#0A2540"
  >Rampit</text>

  <!-- Cyan dot accent on the i -->
  <circle cx="155.5" cy="18" r="3" fill="#00C9A7"/>
</svg>
