[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
celo = "${CELO_RPC_URL}"
celo_alfajores = "${CELO_ALFAJORES_RPC_URL}"
base = "${BASE_RPC_URL}"
bnb = "${BNB_RPC_URL}"

[etherscan]
celo = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api" }
celo_alfajores = { key = "${CELOSCAN_API_KEY}", url = "https://api-alfajores.celoscan.io/api" }
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
bnb = { key = "${BSCSCAN_API_KEY}", url = "https://api.bscscan.com/api" }

[profile.default.fmt]
bracket_spacing = false
int_types = "long"
line_length = 100
multiline_func_header = "all"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
